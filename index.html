<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library Showcase of the Amazing Stories</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>


  <style>
    #zoom-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    #zoom-overlay img {
      max-width: 88%;
      max-height: 88%;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }
    #zoom-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      line-height: 1;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }
    #zoom-close:hover {
      color: #fff066;
    }
  </style>

  <script>
    //Room box borders
    AFRAME.registerComponent('room-bounds', {
      tick: function () {
        const el  = this.el;
        const pos = el.object3D.getWorldPosition(new THREE.Vector3());

        const margin = 0.5;
        const minX = -11 + margin, maxX = 14 - margin;
        const minZ = -10 + margin, maxZ = 5 - margin;

        let newX = Math.min(Math.max(pos.x, minX), maxX);
        let newZ = Math.min(Math.max(pos.z, minZ), maxZ);

        //Door entry borders: Block crossing the x=0 divider wall unless within the doorway
        const wallMargin = 0.4;
        if ((newZ < -6.125 || newZ > 3.0) && newX > -wallMargin && newX < wallMargin) {
          newX = (pos.x < 0) ? -wallMargin : wallMargin;
        }

        if (newX !== pos.x || newZ !== pos.z) {
          const parent    = el.parentEl;
          const parentPos = parent.getAttribute('position');
          parent.setAttribute('position', {
            x: parentPos.x + (newX - pos.x),
            y: parentPos.y,
            z: parentPos.z + (newZ - pos.z)
          });
        }
      }
    });
  </script>
</head>
<body>

<a-scene background="color: #1a1a1a">

  <a-assets timeout="15000">
    <!-- Shared surface textures -->
    <img id="floor-texture"   src="Assets/Final/floor.jpg">
    <img id="ceiling-texture" src="Assets/Final/ceiling.jpg">
    <img id="wall-texture" src="Assets/Final/yellow.jpg">

    <!-- Intro Room -->
    <img id="intro-poster" src="Assets/Final/intro_showcase.jpg">

    <!-- Gallery Room: podium glb models -->
    <a-asset-item id="vol1-1"  src="Assets/Final/vol1_1.glb"></a-asset-item>
    <a-asset-item id="vol3-5"  src="Assets/Final/vol3_5.glb"></a-asset-item>
    <a-asset-item id="vol4-1"  src="Assets/Final/vol4_1.glb"></a-asset-item>
    <a-asset-item id="vol13-3" src="Assets/Final/vol13_3.glb"></a-asset-item>
    <a-asset-item id="vol19-1" src="Assets/Final/vol19_1.glb"></a-asset-item>
    <a-asset-item id="vol34-10" src="Assets/Final/vol_34.glb"></a-asset-item>
    <a-asset-item id="vol38-9" src="Assets/Final/vol38_9.glb"></a-asset-item>
    <a-asset-item id="vol57-5" src="Assets/Final/vol57_5.glb"></a-asset-item>
    <a-asset-item id="vol66-1" src="Assets/Final/vol66_1.glb"></a-asset-item>

    <!-- Gallery Room: description plaques, one per podium -->
    <img id="text-vol1-1"  src="Assets/Final/text_vol1_1.jpg">
    <img id="text-vol3-5"  src="Assets/Final/text_vol3_5.jpg">
    <img id="text-vol4-1"  src="Assets/Final/text_vol4_1.jpg">
    <img id="text-vol13-3" src="Assets/Final/text_vol13_3.jpg">
    <img id="text-vol19-1" src="Assets/Final/text_vol19_1.jpg">
    <img id="text-vol34-10" src="Assets/Final/text_vol34_10.jpg">
    <img id="text-vol38-9" src="Assets/Final/text_vol38_9.jpg">
    <img id="text-vol57-5" src="Assets/Final/text_vol57_5.jpg">
    <img id="text-vol66-1" src="Assets/Final/text_vol66_1.jpg">
  </a-assets>

  <!-- CAMERA: starts in the Intro Room facing the intro text panel -->
  <a-entity position="-5.5 2.6 -2.5">
    <a-camera wasd-controls="acceleration: 50; maxSpeed: 8"
              look-controls
              near="0.1"
              room-bounds>
      <a-cursor color="#FF0000"
        animation__click="property: scale; startEvents: click;
                          from: 0.1 0.1 0.1; to: 1 1 1; dur: 150">
      </a-cursor>
    </a-camera>
  </a-entity>

  <!-- ═══════════════════════ FLOOR (spans both rooms) ═══════════════════════ -->
  <a-plane id="floor" position="1.5 0 -2.5" rotation="-90 0 0" width="25" height="15"
    material="src: #floor-texture; repeat: 1 1; npot: true;">
  </a-plane>

  <!-- ═══════════════════════ CEILING (spans both rooms) ═══════════════════════ -->
  <a-plane id="ceiling" position="1.5 10 -2.5" rotation="90 0 0" width="25" height="15"
    material="src: #ceiling-texture; repeat: 5 3; npot: true;">
  </a-plane>

  <!-- ═══════════════════════ BACK WALL (z = -10), spans both rooms ═══════════════════════ -->
  <a-box id="back-wall" position="1.5 5 -10" width="25" height="10" depth="0.2"
    material="src: #wall-texture; repeat: 2.5 1; npot: true;"></a-box>

  <!-- ═══════════════════════ FRONT both rooms (z = 5) ═══════════════════════ -->
  <a-box id="front-wall" position="1.5 5 5" width="25" height="10" depth="0.2"
    material="src: #wall-texture; repeat: 2.5 1; npot: true;"></a-box>

  <!-- ═══════════════════════ LEFT OUTER WALL (x = -11) — wall stops open at z: -2..2 ═══════════════════════ -->
  <a-box position="-11 5 -2.5" rotation="0 90 0" width="18" height="10" depth="0.2"
    material="src: #wall-texture; repeat: 1 1; npot: true;"></a-box>

  <!-- ═══════════════════════ RIGHT OUTER WALL (x = 14) ═══════════════════════ -->
  <a-box id="right-wall" position="14 5 -6" rotation="0 -90 0" width="33" height="10" depth="0.2"
    material="src: #wall-texture; repeat: 1 1; npot: true;"></a-box>

<!-- ═══════════════════════ WALL 2 — divider between rooms (x = 0) ═══════════════════════-->
  <a-box position="0 5 -8" width="0.2" height="10" depth="3.75"
    material="src: #wall-texture; repeat: 1 1; npot: true;"></a-box>
  <a-box position="0 5 4.5" width="0.2" height="10" depth="3"
    material="src: #wall-texture; repeat: 1 1; npot: true;"></a-box>
  <a-box position="0 9 -1.60" width="0.2" height="2" depth="9.2"
    material="src: #wall-texture; repeat: 1 1; npot: true;"></a-box>

  <!-- ═══════════════════════ INTRO ROOM: intro text panel on back wall ═══════════════════════ -->
  <a-plane position="-5.35 4.75 -9.85" width="6.4" height="7.9"
    material="src: #intro-poster; npot: true; transparent: false;">
  </a-plane>

  <!-- ═══════════════════════ GALLERY ROOM: 9 vol podiums, square layout — 3 per wall ═══════════════════════-->
  <!-- back wall (z = -10) -->
  <a-entity id="podium-1-1" gltf-model="#vol1-1" position="3 0 -9.2"></a-entity>
  <a-plane id="plaque-1-1" class="vol-plaque" data-img="Assets/Final/text_vol1_1.jpg"
    position="3 5 -9.85" width="3.58" height="1.2" scale="0.333 0.333 0.333"
    material="src: #text-vol1-1; npot: true;"></a-plane>

  <a-entity id="podium-3-5" gltf-model="#vol3-5" position="7 0 -9.2"></a-entity>
  <a-plane id="plaque-3-5" class="vol-plaque" data-img="Assets/Final/text_vol3_5.jpg"
    position="7 5 -9.85" width="3.70" height="1.2" scale="0.333 0.333 0.333"
    material="src: #text-vol3-5; npot: true;"></a-plane>

  <a-entity id="podium-4-1" gltf-model="#vol4-1" position="11 0 -9.2"></a-entity>
  <a-plane id="plaque-4-1" class="vol-plaque" data-img="Assets/Final/text_vol4_1.jpg"
    position="11 5 -9.85" width="3.69" height="1.2" scale="0.333 0.333 0.333"
    material="src: #text-vol4-1; npot: true;"></a-plane>

  <!-- right wall (x = 14) — rotated to face -X, into the room -->
  <a-entity id="podium-13-3" gltf-model="#vol13-3" position="13.2 0 -6" rotation="0 -90 0"></a-entity>
  <a-plane id="plaque-13-3" class="vol-plaque" data-img="Assets/Final/text_vol13_3.jpg"
    position="13.85 5 -6" rotation="0 -90 0" width="3.41" height="1.2" scale="0.333 0.333 0.333"
    material="src: #text-vol13-3; npot: true;"></a-plane>

  <a-entity id="podium-19-1" gltf-model="#vol19-1" position="13.2 0 -2" rotation="0 -90 0"></a-entity>
  <a-plane id="plaque-19-1" class="vol-plaque" data-img="Assets/Final/text_vol19_1.jpg"
    position="13.85 5 -2" rotation="0 -90 0" width="2.20" height="1.2" scale="0.333 0.333 0.333"
    material="src: #text-vol19-1; npot: true;"></a-plane>

  <a-entity id="podium-34-10" gltf-model="#vol34-10" position="13.2 0 2" rotation="0 -90 0"></a-entity>
  <a-plane id="plaque-34-10" class="vol-plaque" data-img="Assets/Final/text_vol34_10.jpg"
    position="13.85 5 2" rotation="0 -90 0" width="2.20" height="1.2" scale="0.333 0.333 0.333"
    material="src: #text-vol34-10; npot: true;"></a-plane>

  <!-- front wall (z = 5) — rotated to face -Z, into the room -->
  <a-entity id="podium-38-9" gltf-model="#vol38-9" position="3 0 4.2" rotation="0 180 0"></a-entity>
  <a-plane id="plaque-38-9" class="vol-plaque" data-img="Assets/Final/text_vol38_9.jpg"
    position="3 5 4.85" rotation="0 180 0" width="3.46" height="1.2" scale="0.333 0.333 0.333"
    material="src: #text-vol38-9; npot: true;"></a-plane>

  <a-entity id="podium-57-5" gltf-model="#vol57-5" position="7 0 4.2" rotation="0 180 0"></a-entity>
  <a-plane id="plaque-57-5" class="vol-plaque" data-img="Assets/Final/text_vol57_5.jpg"
    position="7 5 4.85" rotation="0 180 0" width="2.66" height="1.2" scale="0.333 0.333 0.333"
    material="src: #text-vol57-5; npot: true;"></a-plane>

  <a-entity id="podium-66-1" gltf-model="#vol66-1" position="11 0 4.2" rotation="0 180 0"></a-entity>
  <a-plane id="plaque-66-1" class="vol-plaque" data-img="Assets/Final/text_vol66_1.jpg"
    position="11 5 4.85" rotation="0 180 0" width="3.01" height="1.2" scale="0.333 0.333 0.333"
    material="src: #text-vol66-1; npot: true;"></a-plane>

  <!-- LIGHTING -->
  <a-light type="ambient"     color="#BBBBBB"></a-light>
  <a-light type="directional" color="#FFFFFF" intensity="0.6" position="-0.5 1 1"></a-light>
  <!-- Poster corner lights (poster spans x: -8.55 to -2.15, on back wall z=-9.85) -->
  <a-light type="point" color="#ffe8b0" intensity="0.7" distance="8" position="-8.2 6 -9.3"></a-light>
  <a-light type="point" color="#ffe8b0" intensity="0.7" distance="8" position="-2.5 6 -9.3"></a-light>

  <!-- Podium wall corner lights (square layout: back wall, right wall, front wall rows) -->
  <a-light type="point" color="#ffe8b0" intensity="0.7" distance="10" position="3 5 -8"></a-light>
  <a-light type="point" color="#ffe8b0" intensity="0.7" distance="10" position="12 5 -2"></a-light>
  <a-light type="point" color="#ffe8b0" intensity="0.7" distance="10" position="3 5 3"></a-light>

</a-scene>

<!-- ═══════════════════════ ZOOM LIGHTBOX ═══════════════════════ -->
<div id="zoom-overlay">
  <button id="zoom-close" aria-label="Close">&times;</button>
  <img id="zoom-img" src="" alt="Volume description, zoomed in">
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const overlay  = document.getElementById('zoom-overlay');
    const zoomImg  = document.getElementById('zoom-img');
    const closeBtn = document.getElementById('zoom-close');
    const cameraEl = document.querySelector('a-camera');

    function openZoom(src) {
      zoomImg.setAttribute('src', src);
      overlay.style.display = 'flex';
      //Pause camera look/move controls so the view doesn't drift behind the popup
      if (cameraEl) {
        cameraEl.setAttribute('look-controls', 'enabled', false);
        cameraEl.setAttribute('wasd-controls', 'enabled', false);
      }
    }

    function closeZoom() {
      overlay.style.display = 'none';
      if (cameraEl) {
        cameraEl.setAttribute('look-controls', 'enabled', true);
        cameraEl.setAttribute('wasd-controls', 'enabled', true);
      }
    }

    closeBtn.addEventListener('click', closeZoom);
    overlay.addEventListener('click', function (evt) {
      if (evt.target === overlay) closeZoom();
    });

    //clicking it opens the zoom
    document.querySelectorAll('.vol-plaque').forEach(function (plaque) {
      plaque.addEventListener('click', function () {
        openZoom(plaque.dataset.img);
      });
    });
  });
</script>

<!-- ═══════════════════════ GOATCOUNTER ANALYTICS ═══════════════════════ -->
<script data-goatcounter="https://ucrlibraryshowcase.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
